<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Proyecto</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      padding: 0.5rem 1.2rem;
      background: #24292f;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.97rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .github-link:hover {
      background: #444d56;
    }
    .github-link svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="project-detail" style="max-width:700px;margin:2rem auto;padding:1rem;">
    <button @click="goBack" style="margin-bottom:1rem;padding:0.5rem 1.2rem;border-radius:8px;background:#2176ff;color:#fff;border:none;cursor:pointer;">Volver</button>
    <div v-if="project">
      <img :src="project.image" :alt="project.title" style="width:100%;border-radius:12px;margin-bottom:1.2rem;">
      <h1 style="color:#2176ff;font-size:2rem;margin-bottom:0.5rem;">{{ project.title }}</h1>
      <p style="font-size:1.1rem;color:#444;margin-bottom:1rem;">{{ project.description }}</p>
      <div style="margin-bottom:1rem;">
        <strong>Tecnologías usadas:</strong>
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;">
          <span v-for="tech in project.technologies" :key="tech" style="background:#eaf1ff;color:#2176ff;border-radius:6px;padding:0.2rem 0.7rem;font-size:0.95rem;font-weight:500;">{{ tech }}</span>
        </div>
      </div>
      <a v-if="project.github" :href="project.github" target="_blank" rel="noopener noreferrer" class="github-link">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
            0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757
            -1.09-.745.083-.729.083-.729 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304
            3.492.997.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93
            0-1.31.468-2.38 1.235-3.22-.124-.303-.535-1.523.117-3.176 0 0 1.008-.322
            3.3 1.23a11.5 11.5 0 0 1 3.003-.404c1.02.005 2.047.138 3.003.404
            2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.873.118 3.176.77.84
            1.233 1.91 1.233 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823
            2.222 0 1.606-.015 2.898-.015 3.293 0 .322.216.694.825.576C20.565 21.795
            24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Ver en GitHub
      </a>
      <div style="font-size:1rem;color:#333;">{{ project.details }}</div>
    </div>
    <div v-else>
      <p>No se encontró el proyecto.</p>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');
    const app = Vue.createApp({
      data() {
        return {
          project: null
        };
      },
      methods: {
        async fetchProject() {
          const res = await fetch('../js/projects.json');
          const projects = await res.json();
          this.project = projects.find(p => p.id == projectId);
        },
        goBack() {
          window.history.back();
        }
      },
      mounted() {
        this.fetchProject();
      }
    });
    app.mount('#project-detail');
  </script>
</body>
</html>
